name: GSSoC Auto Labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review, closed]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: gssoc-label-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Sync GSSoC labels
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const LABELS = {
              'gssoc:approved': {
                color: '2da44e',
                description: 'Approved and merged GSSoC contribution'
              },
              'level:beginner': {
                color: '9be9a8',
                description: 'Small, beginner-friendly contribution'
              },
              'level:intermediate': {
                color: 'fbca04',
                description: 'Moderate contribution complexity'
              },
              'level:advanced': {
                color: 'fd8c73',
                description: 'Large or advanced contribution'
              },
              'level:critical': {
                color: '8250df',
                description: 'High-impact or very complex contribution'
              },
              'quality:clean': {
                color: 'c5def5',
                description: 'Clean implementation quality'
              },
              'quality:exceptional': {
                color: 'a2facf',
                description: 'Exceptional implementation quality'
              },
              'type:docs': {
                color: 'd4c5f9',
                description: 'Documentation changes'
              },
              'type:bug': {
                color: 'ffccd5',
                description: 'Bug fix changes'
              },
              'type:feature': {
                color: 'd4bfff',
                description: 'New feature or enhancement'
              },
              'type:testing': {
                color: 'b6e3ff',
                description: 'Testing related changes'
              },
              'type:design': {
                color: 'ffb3c7',
                description: 'Design, UI, or UX related changes'
              },
              'type:refactor': {
                color: 'b7eb8f',
                description: 'Refactoring or cleanup work'
              },
              'type:accessibility': {
                color: 'b6e3ff',
                description: 'Accessibility improvements'
              },
              'type:performance': {
                color: 'ffd6a5',
                description: 'Performance improvements'
              },
              'type:devops': {
                color: 'ffd6a5',
                description: 'CI, deployment, or infrastructure changes'
              },
              'type:security': {
                color: 'ffadad',
                description: 'Security-related changes'
              }
            };

            const managedLabelNames = Object.keys(LABELS);
            const managedLabelSet = new Set(managedLabelNames);

            async function ensureLabel(name) {
              const meta = LABELS[name];
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: meta.color,
                    description: meta.description
                  });
                } else {
                  throw error;
                }
              }
            }

            async function ensureAllLabels() {
              for (const name of managedLabelNames) {
                await ensureLabel(name);
              }
            }

            async function syncLabels(issueNumber, desiredLabels) {
              const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              const currentManaged = current.map(label => label.name).filter(name => managedLabelSet.has(name));
              const desired = [...new Set(desiredLabels)].filter(Boolean);

              const toAdd = desired.filter(name => !currentManaged.includes(name));
              const toRemove = currentManaged.filter(name => !desired.includes(name));

              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: toAdd
                });
              }

              for (const name of toRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    name
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }

            function uniq(list) {
              return [...new Set(list.filter(Boolean))];
            }

            function textBlob() {
              const parts = [];
              const issue = context.payload.issue;
              const pr = context.payload.pull_request;

              if (issue?.title) parts.push(issue.title);
              if (issue?.body) parts.push(issue.body);
              if (pr?.title) parts.push(pr.title);
              if (pr?.body) parts.push(pr.body);
              return parts.join('\n').toLowerCase();
            }

            function classifyByFiles(files) {
              const labels = new Set();
              const lowerNames = files.map(f => f.filename.toLowerCase());
              const blob = textBlob();

              const docsHint = lowerNames.some(name =>
                name.startsWith('docs/') ||
                name.includes('/docs/') ||
                /(^|\/)(readme|changelog|contributing|code_of_conduct|license)(\.[^/]+)?$/i.test(name) ||
                /\.(md|mdx|rst|txt|adoc)$/i.test(name)
              );
              if (docsHint || /\bdocs?\b/.test(blob) || /\bdocumentation\b/.test(blob)) labels.add('type:docs');

              const testingHint = lowerNames.some(name =>
                name.includes('/test/') ||
                name.includes('/tests/') ||
                name.includes('/__tests__/') ||
                /(^|\/)(test|tests)\//i.test(name) ||
                /\.(test|spec)\.[^.\/]+$/i.test(name) ||
                /\.(test|spec)\.[^.]+$/i.test(name)
              );
              if (testingHint || /\btest(s|ing)?\b/.test(blob) || /\bqa\b/.test(blob)) labels.add('type:testing');

              const designHint = lowerNames.some(name =>
                name.includes('/design/') ||
                name.includes('/ui/') ||
                name.includes('/ux/') ||
                name.includes('/assets/') ||
                /\.(fig|svg|png|jpe?g|gif|webp|ico)$/i.test(name) ||
                /\.(css|scss|sass|less)$/i.test(name)
              );
              if (designHint || /\bdesign\b/.test(blob) || /\bui\b/.test(blob) || /\bux\b/.test(blob)) labels.add('type:design');

              const accessibilityHint = lowerNames.some(name =>
                name.includes('accessibility') ||
                name.includes('/a11y/') ||
                /aria|wcag/.test(name)
              );
              if (accessibilityHint || /\baccessibility\b/.test(blob) || /\ba11y\b/.test(blob) || /\baria\b/.test(blob) || /\bwcag\b/.test(blob)) labels.add('type:accessibility');

              const performanceHint = lowerNames.some(name =>
                name.includes('perf') ||
                name.includes('performance') ||
                name.includes('benchmark') ||
                name.includes('cache')
              );
              if (performanceHint || /\bperformance\b/.test(blob) || /\boptimi[sz]e\b/.test(blob) || /\bbenchmark\b/.test(blob)) labels.add('type:performance');

              const devopsHint = lowerNames.some(name =>
                name.startsWith('.github/workflows/') ||
                name.includes('/.github/workflows/') ||
                name.includes('/docker') ||
                name.includes('dockerfile') ||
                name.includes('compose.yml') ||
                name.includes('compose.yaml') ||
                name.includes('terraform') ||
                name.includes('k8s') ||
                name.includes('kubernetes') ||
                name.includes('helm') ||
                name.includes('/ci/')
              );
              if (devopsHint || /\b(devops|ci|cd|deploy|deployment|pipeline|docker|kubernetes|terraform)\b/.test(blob)) labels.add('type:devops');

              const securityHint = lowerNames.some(name =>
                name.includes('security') ||
                name.includes('/auth/') ||
                name.includes('oauth') ||
                name.includes('jwt') ||
                name.includes('secret') ||
                name.includes('encrypt')
              );
              if (securityHint || /\bsecurity\b/.test(blob) || /\bauth\b/.test(blob) || /\boauth\b/.test(blob) || /\bjwt\b/.test(blob) || /\bencrypt/.test(blob)) labels.add('type:security');

              const bugHint = /\b(bug|fix|hotfix|patch|resolve|resolved|issue)\b/.test(blob);
              if (bugHint) labels.add('type:bug');

              const featureHint = /\b(feature|enhancement|implement|add|added|introduce|new)\b/.test(blob);
              if (featureHint) labels.add('type:feature');

              const refactorHint = /\b(refactor|cleanup|restructure|simplify|rewrite|rename)\b/.test(blob);
              if (refactorHint) labels.add('type:refactor');

              return labels;
            }

            function classifyLevel(stats) {
              const totalChanges = (stats.additions || 0) + (stats.deletions || 0);
              const files = stats.files || 0;

              if (files <= 3 && totalChanges <= 50) return 'level:beginner';
              if (files <= 8 && totalChanges <= 250) return 'level:intermediate';
              if (files <= 15 && totalChanges <= 700) return 'level:advanced';
              return 'level:critical';
            }

            async function getPRFilesAndReviews(prNumber) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100
              });

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100
              });

              return { files, reviews };
            }

            await ensureAllLabels();

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              if (!issue) return;

              const body = textBlob();
              const issueLabels = new Set();

              const hasAny = (regex) => regex.test(body);

              if (hasAny(/\b(bug|error|crash|fail|broken|issue|fix)\b/)) issueLabels.add('type:bug');
              if (hasAny(/\b(feature|enhancement|request|add|implement)\b/)) issueLabels.add('type:feature');
              if (hasAny(/\bdocs?|documentation|readme\b/)) issueLabels.add('type:docs');
              if (hasAny(/\b(test|testing|qa)\b/)) issueLabels.add('type:testing');
              if (hasAny(/\b(design|ui|ux|mockup|layout|style)\b/)) issueLabels.add('type:design');
              if (hasAny(/\b(refactor|cleanup|restructure|simplify|rewrite|rename)\b/)) issueLabels.add('type:refactor');
              if (hasAny(/\b(accessibility|a11y|aria|wcag)\b/)) issueLabels.add('type:accessibility');
              if (hasAny(/\b(performance|slow|optimi[sz]e|lag|benchmark|cache)\b/)) issueLabels.add('type:performance');
              if (hasAny(/\b(devops|ci|cd|deploy|deployment|pipeline|docker|kubernetes|terraform)\b/)) issueLabels.add('type:devops');
              if (hasAny(/\b(security|auth|oauth|jwt|secret|encrypt|vulnerability)\b/)) issueLabels.add('type:security');

              await syncLabels(issue.number, [...issueLabels]);
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr) return;

            const prNumber = pr.number;
            const { files, reviews } = await getPRFilesAndReviews(prNumber);

            const fileLabels = classifyByFiles(files);
            const levelLabel = classifyLevel({
              files: files.length,
              additions: pr.additions || 0,
              deletions: pr.deletions || 0
            });

            const approved = reviews.some(review => review.state === 'APPROVED');
            const merged = Boolean(pr.merged_at || pr.merged);
            const prLabels = new Set([...fileLabels, levelLabel]);

            if (merged && approved) {
              prLabels.add('gssoc:approved');
            }

            await syncLabels(prNumber, [...prLabels]);
